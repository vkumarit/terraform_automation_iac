---
## (start of file)

# When access to azure devops pipeline job run summary not available

trigger:
  branches:
    include:
      - main
    exclude:
      - terraform-logs

variables:
- group: az-classic-kv-var
- name: serviceConnection
  value: 'az-classic-conn'
- name: ENVIRONMENT
  value: prod
  #value: $(Build.SourceBranchName) #for environment-specific (dev/prod/test/staging) pipeline runs
- name: SIZE_ALIAS
  value: small


pool:
  name: 'az-classic-pool'   # EC2 self-hosted agent
  demands:
  - agent.name -equals az-classic-agent
  # Use `demands` when not using environment lock `environment: "terraform-prod"` 

stages:
- stage: Deploy
  displayName: "Terraform Deploy"
  jobs:
  
  #- deployment: Terraform             # `environment:` and `strategy:` only work with deployment jobs
  #environment: "terraform-prod"
    #strategy:
      #runOnce:
        #deploy:
          #steps:
          
  - job: Terraform
    displayName: "Terraform Init, Plan & Apply"
    
    steps:

    - checkout: self
      #persistCredentials: true
    
    # -----------------------------
    # Install Terraform
    # -----------------------------
    - task: TerraformInstaller@0
      inputs:
        terraformVersion: '1.6.6' #  for prod and 'latest' for dev/test/staging

    # -----------------------------
    # Make runterraform.sh executable
    # -----------------------------
    - script: |
        chmod +x runterraform.sh
      workingDirectory: azuretf/simpletf
      displayName: "Make runterraform.sh executable"
    
    # -----------------------------
    # Verify GITHUB_TOKEN
    # -----------------------------
    - script: |
        echo "---- DEBUG GITHUB_TOKEN ----"
        if [[ -z "${GITHUB_TOKEN:-}" ]]; then
          echo "GITHUB_TOKEN is empty!"
        else
          echo "GITHUB_TOKEN length: ${#GITHUB_TOKEN}"
        fi
      workingDirectory: azuretf/simpletf
      displayName: "Check GITHUB_TOKEN"
      env:
        GITHUB_TOKEN: $(githubtoken)

    # -----------------------------
    # Debug directory
    # -----------------------------
    - script: |
        echo "PWD:"
        pwd
        echo "FILES:"
        ls -la
      workingDirectory: azuretf/simpletf
      displayName: "Debug directory"
    
    # -----------------------------
    # Debug secret injection
    # -----------------------------
    - script: |
        echo "DEBUG: ARM_CLIENT_ID length: ${#ARM_CLIENT_ID}"
        echo "DEBUG: ARM_CLIENT_SECRET length: ${#ARM_CLIENT_SECRET}"
        echo "DEBUG: ARM_TENANT_ID present: ${ARM_TENANT_ID:+yes}"
        echo "DEBUG: ARM_SUBSCRIPTION_ID present: ${ARM_SUBSCRIPTION_ID:+yes}"
        terraform version
        terraform providers
      workingDirectory: azuretf/simpletf
      displayName: "Debug Terraform Environment"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)    
    
    # -----------------------------
    # Terraform Init
    # -----------------------------
    - script: |
        cd azuretf/simpletf
        ./runterraform.sh init
        #terraform init
      #workingDirectory: azuretf/simpletf
      displayName: "Terraform Init"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
        GITHUB_TOKEN: $(githubtoken)

    # -----------------------------
    # Terraform Plan
    # -----------------------------
    - script: |
        cd azuretf/simpletf
        ./runterraform.sh plan
        #terraform plan -out=tfplan
    #  workingDirectory: azuretf/simpletf
      displayName: "Terraform Plan"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
        GITHUB_TOKEN: $(githubtoken)
        TF_VAR_environment: $(ENVIRONMENT)
        TF_VAR_size_alias: $(SIZE_ALIAS)

    # -----------------------------
    # Terraform Apply
    # -----------------------------
    - script: |
        cd azuretf/simpletf
        ./runterraform.sh apply
        #terraform apply -auto-approve tfplan
    #  workingDirectory: azuretf/simpletf
      displayName: "Terraform Apply"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
        GITHUB_TOKEN: $(githubtoken)
        TF_VAR_environment: $(ENVIRONMENT)
        TF_VAR_size_alias: $(SIZE_ALIAS)
        
    # -----------------------------
    # Clean Terraform junk after every run
    # -----------------------------    
    - script: |
        rm -rf azuretf/simpletf/.terraform
        rm -f azuretf/simpletf/*.tfstate*
        rm -f azuretf/simpletf/.terraform.lock.hcl
        rm -f azuretf/simpletf/tfplan.binary
        rm -rf .terraform-run-logs
      condition: always()
      displayName: "Cleanup Terraform workdir"

# (end of file)
...

