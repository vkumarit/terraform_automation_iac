## (start of file)

# When access to azure devops pipeline job run summary not available

trigger:
  branches:
    include:
      - main
    exclude:
      - terraform-logs

variables:
#- group: az-classic-kv-var
- group: temp-var
- name: serviceConnection
  value: 'az-classic-conn'
- name: ENVIRONMENT
  value: prod
  #value: $(Build.SourceBranchName) #for environment-specific (dev/prod/test/staging) pipeline runs
- name: SIZE_ALIAS
  value: small


pool:
  name: 'az-classic-pool'   # EC2 self-hosted agent
  demands:
  - agent.name -equals az-classic-agent
  # Use `demands` when not using environment lock `environment: "terraform-prod"` 

stages:
- stage: Deploy
  displayName: "Terraform Deploy"
  jobs:
  
  #- deployment: Terraform             # `environment:` and `strategy:` only work with deployment jobs
  #environment: "terraform-prod"
    #strategy:
      #runOnce:
        #deploy:
          #steps:
          
  - job: Terraform
    displayName: "Terraform Init, Plan & Apply"
    
    steps:

    - checkout: self
      #persistCredentials: true
    
    # -----------------------------
    # Download Key Vault Secrets
    # -----------------------------
    #- task: AzureKeyVault@2
    #  displayName: 'Download Key Vault Secrets'
    #  inputs:
    #    azureSubscription: $(serviceConnection)
    #    KeyVaultName: 'prodmyappkv'
    #    SecretsFilter: 'sp-client-id,sp-client-secret,sp-tenant-id,sp-subscription-id,githubtoken'
    #    RunAsPreJob: true
    
    # -----------------------------
    # Install Terraform
    # -----------------------------
    - task: TerraformInstaller@0
      inputs:
        terraformVersion: '1.14.8' #  for prod and 'latest' for dev/test/staging

    # -----------------------------
    # Azure CLI Login & agreement check (needed for orphan cleanup)
    # -----------------------------
    #- task: AzureCLI@2
    #  displayName: "Azure CLI Login"
    #  inputs:
    #    azureSubscription: $(serviceConnection)
    #    scriptType: bash
    #    scriptLocation: inlineScript
    #    inlineScript: |
    #      echo "Logging into Azure..."
    #      az account show
    #      echo "Azure login successful."
           
    #      echo "Checking marketplace agreement..."
          
    #      ACCEPTED=$(az vm image terms show \
    #        --publisher cognosys \
    #        --offer centos-8-3-free \
    #        --plan centos-8-3-free \
    #        --query accepted -o tsv)
            
    #      if [ "$ACCEPTED" != "true" ]; then
    #        echo "Accepting marketplace terms..."
    #        az vm image terms accept \
    #          --publisher cognosys \
    #          --offer centos-8-3-free \
    #          --plan centos-8-3-free
    #      else
    #        echo "Marketplace agreement already accepted."
    #      fi
        # Remove the agreement code after run once per subscription, 
        # after Azure stores it permanently.
        # **This placeholder can be used to run other az cli commands also.**

    # -----------------------------
    # Ensure jq is installed
    # -----------------------------
    - script: |
        echo "Checking jq installation..."
        if command -v jq >/dev/null 2>&1; then
          echo "jq already installed: $(jq --version)"
        else
          echo "jq not found. Installing jq..."
          if command -v yum >/dev/null 2>&1; then
            sudo yum install -y jq
          else
            echo "ERROR: Unsupported package manager. Install jq manually."
            exit 1
          fi
          echo "jq installed successfully: $(jq --version)"
        fi
      displayName: "Ensure jq is installed"
      
    # -----------------------------
    # Make runterraform.sh executable
    # -----------------------------
    - script: |
        chmod +x runterraform.sh
      workingDirectory: azuretf/simpletf
      displayName: "Make runterraform.sh executable"
    
    # -----------------------------
    # Debug directory
    # -----------------------------
    - script: |
        echo "PWD:"
        pwd
        echo "FILES:"
        ls -la
      workingDirectory: azuretf/simpletf
      displayName: "Debug directory"
        
    # -----------------------------
    # Debug Secret Injection
    # -----------------------------
    - script: |
        echo "DEBUG: ARM_CLIENT_ID length: ${#ARM_CLIENT_ID}"
        echo "DEBUG: ARM_CLIENT_SECRET length: ${#ARM_CLIENT_SECRET}; first 5 chars: ${ARM_CLIENT_SECRET:0:5}"
        echo "DEBUG: ARM_TENANT_ID present: ${ARM_TENANT_ID:+yes}"
        echo "DEBUG: ARM_SUBSCRIPTION_ID present: ${ARM_SUBSCRIPTION_ID:+yes}"
        echo "GITHUB_TOKEN length: ${#GITHUB_TOKEN}"
        terraform version
      workingDirectory: azuretf/simpletf
      displayName: "Debug Terraform Environment variables"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
        GITHUB_TOKEN: $(githubtoken)
    
    # -----------------------------
    # Test client secret
    # -----------------------------
    #- bash: |
    #    echo "## DEBUG PIPELINE SECRET ##"
    #    echo "Length: ${#ARM_CLIENT_SECRET}"
    #    echo "Preview: ${ARM_CLIENT_SECRET:0:20}"
    #    echo -n "$ARM_CLIENT_SECRET" | od -c | head -n 3
    #    echo -n "$ARM_CLIENT_SECRET" | xxd | head -n 1
    #  displayName: 'Debug Pipeline Secret Bytes'
    #  env:
    #    ARM_CLIENT_SECRET: $(sp-client-secret)
        
    # -----------------------------
    # Terraform Validate/Lint
    # -----------------------------
    - script: terraform fmt -check -recursive
      displayName: "Terraform Format Check"

    - script: terraform init -backend=false -no-color
      displayName: "Terraform Init (Validation Only)"

    - script: terraform validate -no-color
      displayName: "Terraform Validate"    
    
    # -----------------------------
    # Terraform Init
    # -----------------------------
    - script: |
        cd azuretf/simpletf
        ./runterraform.sh init
        #terraform init -upgrade
      #workingDirectory: azuretf/simpletf
      displayName: "Terraform Init"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
        GITHUB_TOKEN: $(githubtoken)

    # -----------------------------
    # Terraform Plan
    # -----------------------------
    - script: |
        cd azuretf/simpletf
        ./runterraform.sh plan
        #terraform plan -out=tfplan
      #workingDirectory: azuretf/simpletf
      displayName: "Terraform Plan"
      env:
       ARM_CLIENT_ID: $(sp-client-id)
       ARM_CLIENT_SECRET: $(sp-client-secret)
       ARM_TENANT_ID: $(sp-tenant-id)
       ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
       GITHUB_TOKEN: $(githubtoken)
       TF_VAR_environment: $(ENVIRONMENT)
       TF_VAR_size_alias: $(SIZE_ALIAS)
       TF_VAR_run_id: $(Build.BuildId)
       RUN_ID: $(Build.BuildId)
       ALLOW_EMPTY_STATE: "true"

    # -----------------------------
    # Terraform Apply
    # -----------------------------
    - script: |
        cd azuretf/simpletf
        ./runterraform.sh apply
        #terraform apply -auto-approve tfplan
      #workingDirectory: azuretf/simpletf
      displayName: "Terraform Apply"
      env:
        ARM_CLIENT_ID: $(sp-client-id)
        ARM_CLIENT_SECRET: $(sp-client-secret)
        ARM_TENANT_ID: $(sp-tenant-id)
        ARM_SUBSCRIPTION_ID: $(sp-subscription-id)
        GITHUB_TOKEN: $(githubtoken)
        TF_VAR_environment: $(ENVIRONMENT)
        TF_VAR_size_alias: $(SIZE_ALIAS)
        TF_VAR_run_id: $(Build.BuildId)              #for terraform env
        RUN_ID: $(Build.BuildId)                     #for .sh
        
    # -----------------------------
    # Clean Terraform junk after every run
    # -----------------------------    
    - script: |
        rm -rf azuretf/simpletf/.terraform
        rm -f azuretf/simpletf/*.tfstate*
        rm -f azuretf/simpletf/.terraform.lock.hcl
        rm -f azuretf/simpletf/tfplan.binary
        rm -f azuretf/simpletf/tfplan.recovery*
        rm -rf .terraform-run-logs
      condition: always()
      displayName: "Cleanup Terraform workdir"

# (end of file)
...

